<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENKEU_PORTALDATA</title>

  <!-- FAVICON DITAMBAHKAN DI SINI -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="shortcut icon" href="./favicon.ico">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fefce8; /* Disesuaikan dengan tema portal */
      font-family: 'Inter', sans-serif;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    .main-header {
      height: 36px; /* Disesuaikan agar ramping seperti sebelumnya */
      padding: 0 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5dcc3;
      background-color: #92400e; /* Warna header krem lembut */
      color: #fefce8; /* Warna cokelat utama */
      font-size: 0.8rem;
      flex-shrink: 0;
      z-index: 100;
    }
    
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .work-space {
      flex-grow: 1;
      position: relative;
      width: 100%;
      overflow: hidden;
      background-color: #fefce8;
    }

    .work-space iframe {
      width: 100%;
      height: 100%; 
      border: none;
      display: block;
    }

    .loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fefce8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 50;
      transition: opacity 0.3s ease;
    }

    .system-status {
      font-size: 9px;
      font-weight: 600;
      background-color: #fefce8;
      color: #92400e;
      padding: 2px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #92400e;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #10b981; /* Tetap hijau dengan efek glow */
      border-radius: 50%;
      box-shadow: 0 0 6px #10b981;
      animation: pulse 2s infinite;
    }

    .spinner {
      width: 35px;
      height: 35px;
      border: 3px solid #e5dcc3;
      border-top: 3px solid #92400e;
      border-radius: 50%;
      animation: putar 0.7s linear infinite;
    }

    @keyframes putar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header class="main-header">
      <div class="header-title">
        <i class="bi bi-shield-check"></i> <span>Manajemen Data & Sistem Informasi</span>
      </div>
      <div class="system-status">
        <div class="status-dot"></div> System Cloud Active
      </div>
    </header>

    <main class="work-space">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div style="margin-top:10px; font-weight:700; color:#92400e; font-size:0.75rem;">MEMUAT HALAMAN...</div>
      </div>
      
      <iframe 
        src="https://script.google.com/macros/s/AKfycbz9rDwWiSAYaxwIYC08G9xotzRUm3qI09BmDIvrIhGTYzhYWhnOJ6pAPWuGfV8mBK2RmQ/exec"
        allow="camera; microphone; geolocation; fullscreen"
        onload="document.querySelector('.loading-screen').style.opacity='0'; setTimeout(()=>{document.querySelector('.loading-screen').style.display='none'},300)">
      </iframe>
    </main>
  </div>

  <script>
    function adjustIframe() {
      const iframe = document.querySelector('iframe');
      // Memaksa lebar dan tinggi iframe mengikuti ukuran jendela browser secara absolut
      iframe.style.width = window.innerWidth + 'px';
      iframe.style.height = window.innerHeight + 'px';
    }

    // Jalankan saat halaman dimuat
    window.addEventListener('load', adjustIframe);
    
    // Jalankan saat HP diputar (penting untuk deteksi portrait/landscape)
    window.addEventListener('resize', adjustIframe);
    
    function hilangkanLoader() {
      const loader = document.querySelector('.loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 300);
      }
    }
  </script>
</body>
</html>
